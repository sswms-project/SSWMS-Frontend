    }catch(_e){}</script></head><body class="font-body-md text-on-surface industrial-bg min-h-screen flex items-center justify-center p-gutter">
<!-- Verification Container -->
<main class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant shadow-sm overflow-hidden flex flex-col rounded-lg">
<!-- Header / Brand Anchor -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="flex justify-center mb-6">
<img alt="SSWMS Identity Verification logo" class="h-12 w-auto" src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg">
</div>
<h1 class="font-display-lg text-display-lg text-primary mb-2">SSWMS</h1>
<p class="font-label-md text-label-md text-secondary uppercase tracking-widest">Logistics Hub Verification</p>
</div>
<!-- Verification Section -->
<div class="px-8 pb-10 flex flex-col">
<div class="mb-8 text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-3">Identity Verification</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    We've sent a 6-digit manifest authorization code to your registered mobile device.
                </p>
</div>
<!-- OTP Input Grid -->
<form class="flex flex-col gap-8" id="otp-form">
<div class="flex justify-between gap-2" id="otp-inputs">
<input aria-label="Digit 1" autofocus="" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
<input aria-label="Digit 2" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
<input aria-label="Digit 3" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
<input aria-label="Digit 4" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
<input aria-label="Digit 5" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
<input aria-label="Digit 6" class="otp-input w-12 h-14 text-center text-title-lg font-mono-data border border-outline-variant bg-surface-bright transition-all" maxlength="1" type="text">
</div>
<!-- Actions -->
<div class="flex flex-col gap-4">
<button class="w-full py-3.5 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2 uppercase tracking-wider" type="submit">
<span class="material-symbols-outlined" style="font-size: 18px;">verified_user</span>
                        Authorize Access
                    </button>
<div class="flex items-center justify-between mt-2">
<button class="text-primary font-label-md text-label-md flex items-center gap-1 hover:underline group" type="button">
<span class="material-symbols-outlined transition-transform group-hover:-translate-x-1" style="font-size: 16px;">arrow_back</span>
                            Change Number
                        </button>
<div class="flex items-center gap-2">
<span class="text-on-surface-variant font-label-md text-label-md" id="timer-label">Resend in:</span>
<span class="font-mono-data text-primary font-bold" id="countdown">00:59</span>
<button class="hidden text-primary font-label-md text-label-md hover:underline" id="resend-btn" type="button">
                                Resend Code
                            </button>
</div>
</div>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="bg-surface-container-low p-6 border-t border-outline-variant flex items-start gap-4">
<span class="material-symbols-outlined text-outline" style="font-size: 20px;">info</span>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface mb-0.5">Secure Session</span>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-tight">
                    This authorization is valid for 10 minutes. If you encounter issues, contact the System Operations help desk.
                </p>
</div>
</div>
</main>
<!-- Micro-interaction Scripts -->
<script>
        // OTP Auto-focus and backspace logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Timer Logic
        let timeLeft = 59;
        const countdownEl = document.getElementById('countdown');
        const timerLabel = document.getElementById('timer-label');
        const resendBtn = document.getElementById('resend-btn');

        const timer = setInterval(() => {
            timeLeft--;
            const seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            countdownEl.textContent = `00:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownEl.classList.add('hidden');
                timerLabel.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            }
        }, 1000);

        // Form Submit Simulation
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            // Industrial Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing...
            `;

            setTimeout(() => {
                submitBtn.classList.remove('bg-primary');
                submitBtn.classList.add('bg-green-600');
                submitBtn.innerHTML = `
                    <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path class="success-checkmark" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Authorized
                `;
                
                // Redirect simulation
                setTimeout(() => {
                    alert('Warehouse Access Granted. Redirecting to Logistics Hub...');
                }, 1000);
            }, 1800);
        });
    </script>
</body></html>
